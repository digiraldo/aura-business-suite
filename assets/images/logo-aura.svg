<!-- 
    Logo AURA Business Suite
    
    INSTRUCCIONES PARA REEMPLAZAR ESTE PLACEHOLDER:
    
    1. Crea tu logo en formato PNG con fondo transparente
    2. Dimensiones recomendadas: 400x400 píxeles (mínimo 200x200)
    3. Paleta de colores sugerida:
       - Primario: #2271b1 (azul WordPress)
       - Secundario: #135e96 (azul oscuro)
       - Acento: #00a32a (verde)
    4. Incluye el texto "AURA" o iconografía empresarial
    5. Guarda como "logo-aura.png" en esta misma carpeta
    6. Elimina este archivo .svg
    
    El logo se usa en:
    - Pantalla de login de WordPress
    - Dashboard principal del plugin
    - README.md del repositorio
    - Emails de notificación (opcional)
-->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Fondo degradado -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2271b1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#135e96;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Círculo de fondo -->
  <circle cx="200" cy="200" r="180" fill="url(#gradient)" opacity="0.9"/>
  
  <!-- Forma de "A" estilizada -->
  <g transform="translate(200, 200)">
    <!-- Barra izquierda de la A -->
    <polygon points="-60,-80 -40,-80 10,80 -10,80" fill="#ffffff"/>
    
    <!-- Barra derecha de la A -->
    <polygon points="40,-80 60,-80 10,80 -10,80" fill="#ffffff" opacity="0.9"/>
    
    <!-- Barra horizontal de la A -->
    <rect x="-35" y="-10" width="70" height="20" fill="#00a32a" rx="5"/>
    
    <!-- Ícono de gráfico en miniatura -->
    <g transform="translate(0, 40) scale(0.6)">
      <rect x="-15" y="20" width="8" height="30" fill="#ffffff" opacity="0.6" rx="2"/>
      <rect x="-3" y="15" width="8" height="35" fill="#ffffff" opacity="0.7" rx="2"/>
      <rect x="9" y="10" width="8" height="40" fill="#ffffff" opacity="0.8" rx="2"/>
    </g>
  </g>
  
  <!-- Texto AURA -->
  <text x="200" y="340" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">
    AURA
  </text>
  
  <!-- Subtítulo -->
  <text x="200" y="370" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" opacity="0.8">
    Business Suite
  </text>
  
  <!-- Efecto de brillo -->
  <rect x="0" y="0" width="400" height="400" fill="url(#shimmer)" opacity="0.3">
    <animateTransform
      attributeName="transform"
      attributeType="XML"
      type="translate"
      from="-400 0"
      to="400 0"
      dur="3s"
      repeatCount="indefinite"/>
  </rect>
</svg>
